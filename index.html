<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="description" content="Guardian Monsters Arena - Farcaster Mini App">
<title>Guardian Monsters Arena</title>
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/farcaster-sdk/dist/farcaster-sdk.min.js"></script>
<style>
    /* Ensure 2:3 aspect ratio and scaling for devicePixelRatio */
    html, body { margin:0; padding:0; height:100%; overflow:hidden; }
    #gameCanvas {
        width:100vw;
        height:calc(100vw * 1.5);
        max-height:100vh;
        display:block;
        background:#000;
    }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
/* ---- Farcaster & ETH Integration ---- */
const FID = 208189; // Your fid for manifest reference

let farcasterSDK;
let userFID;
let userPaid = false;

// Example backend endpoints
const BACKEND_BASE = "https://your-backend.com"; // Replace with your backend or contract API

async function initFarcaster() {
    farcasterSDK = new FarcasterSDK(); // Initialize SDK
    const account = await farcasterSDK.connectWallet();
    userFID = account.fid;
    console.log("User FID:", userFID);
    userPaid = await checkFee(userFID);
}

async function checkFee(fid) {
    try {
        const res = await fetch(`${BACKEND_BASE}/checkFee?fid=${fid}`);
        const data = await res.json();
        return data.paid; // true if already paid
    } catch (e) {
        console.error(e);
        return false;
    }
}

async function getEthAmountForUSD(usdAmount = 0.10) {
    try {
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd");
        const data = await res.json();
        const ethPrice = data.ethereum.usd;
        return (usdAmount / ethPrice).toFixed(6); // approx ETH
    } catch (e) {
        console.error(e);
        return 0;
    }
}

async function payArenaFee() {
    if(userPaid) return true;
    const amountETH = await getEthAmountForUSD(0.10);
    try {
        const tx = await farcasterSDK.sendETH({
            to: "0x039264FdED28cc7f7C21b29Cd6cDbBbeb8a5cc9e",
            value: amountETH
        });
        console.log("Transaction hash:", tx.hash);
        await registerFeePaid(userFID);
        userPaid = true;
        return true;
    } catch(e) {
        console.error("Payment failed:", e);
        alert("Payment failed, cannot enter Arena.");
        return false;
    }
}

async function registerFeePaid(fid) {
    try {
        await fetch(`${BACKEND_BASE}/registerFeePaid`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({fid})
        });
    } catch(e) {
        console.error(e);
    }
}

/* ---- Game Initialization ---- */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = canvas.width * 1.5;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// Load assets (sprites, tiles, backdrops)
const assets = {};
const imageList = [
    "tilesets/limbusdev_world2.png",
    "backdrops/battle/cave.png",
    "sprites/monsters/128x128/0_0.png",
    "sprites/ui/b-fight.png"
    // Add all other sprites/backdrops needed
];

imageList.forEach(src => {
    const img = new Image();
    img.src = src;
    assets[src] = img;
});

/* ---- Simple Game Loop ---- */
let gameState = "world"; // "world", "arena"
function gameLoop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(gameState === "world") {
        // Draw world tiles
        ctx.drawImage(assets["tilesets/limbusdev_world2.png"],0,0,canvas.width,canvas.height);
        // Example click to enter arena
        canvas.onclick = async () => {
            const feePaid = await payArenaFee();
            if(feePaid) gameState = "arena";
        };
    } else if(gameState === "arena") {
        ctx.drawImage(assets["backdrops/battle/cave.png"],0,0,canvas.width,canvas.height);
        // Draw monster and UI
        ctx.drawImage(assets["sprites/monsters/128x128/0_0.png"],50,50,128,128);
        ctx.drawImage(assets["sprites/ui/b-fight.png"], 10, canvas.height - 100, 100, 50);
    }
    requestAnimationFrame(gameLoop);
}

/* ---- Start Game ---- */
initFarcaster().then(() => {
    requestAnimationFrame(gameLoop);
});
</script>
</body>
</html>
